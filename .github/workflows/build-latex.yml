name: Build LaTeX Document

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Verify titlepage PDF exists
      run: |
        if [ ! -f "titlepage/Thesis_Titlepage.pdf" ]; then
          echo "Error: titlepage/Thesis_Titlepage.pdf not found in repository"
          echo "The pre-built titlepage PDF must be committed to the repository"
          exit 1
        fi
        echo "Titlepage PDF found"

    - name: Install Tectonic
      run: |
        curl -fsSL https://drop-sh.fullyjustified.net | sh
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH

    - name: Compile LaTeX document
      run: |
        chmod +x build.sh
        bash build.sh

    - name: Upload PDF artifact
      uses: actions/upload-artifact@v4
      with:
        name: thesis-pdf
        path: main.pdf
        retention-days: 90

    - name: Prepare GitHub Pages content
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        mkdir -p _site
        cp main.pdf _site/
        echo '<!DOCTYPE html>
        <html>
        <head>
          <meta charset="utf-8">
          <title>Master Thesis</title>
          <meta http-equiv="refresh" content="0; url=main.pdf">
        </head>
        <body>
          <p>Redirecting to <a href="main.pdf">main.pdf</a>...</p>
        </body>
        </html>' > _site/index.html

    - name: Upload Pages artifact
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: actions/upload-pages-artifact@v3
      with:
        path: _site

    - name: Check for compilation warnings
      if: always()
      run: |
        if [ -f main.log ]; then
          echo "### LaTeX Compilation Log Warnings ###"
          grep -i "warning" main.log || echo "No warnings found"
        fi

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
